name: Functional Tests & Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  functional-tests:
    name: KiCad Integration Tests
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/kicad/kicad:10.0

    steps:
      - uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          pip install pytest --break-system-packages || pip install pytest

      - name: Verify pcbnew is available
        run: |
          python3 -c "import pcbnew; print(f'KiCad pcbnew version: {pcbnew.Version()}')"

      - name: Run functional tests (fixture boards)
        run: |
          python3 -m pytest tests/functional/test_kicad_integration.py -m functional -v --tb=short
        env:
          DISPLAY: ""
          QT_QPA_PLATFORM: "offscreen"

  benchmarks:
    name: Routing Benchmarks
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/kicad/kicad:10.0

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install pytest --break-system-packages || pip install pytest

      - name: Verify pcbnew is available
        run: |
          python3 -c "import pcbnew; print(f'KiCad pcbnew version: {pcbnew.Version()}')"

      - name: Clone Arduino test boards
        run: |
          git clone --depth 1 https://github.com/sabogalc/KiCad-Arduino-Boards.git arduino-boards

      - name: Download previous benchmark results
        uses: actions/cache@v4
        with:
          path: benchmark-results.json
          key: benchmark-results-${{ github.ref_name }}
          restore-keys: |
            benchmark-results-main
            benchmark-results-

      - name: Run benchmark suite
        run: |
          python3 -m pytest tests/functional/test_benchmark_boards.py -m functional -v -s --tb=short
        env:
          DISPLAY: ""
          QT_QPA_PLATFORM: "offscreen"
          ARDUINO_BOARDS_DIR: ./arduino-boards
          METRICS_OUTPUT: ./benchmark-results.json
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Generate benchmark comparison
        if: always()
        run: |
          python3 scripts/compare_benchmarks.py --file benchmark-results.json --runs 2 | tee benchmark-summary.txt

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark-results.json
            benchmark-summary.txt

      - name: Comment benchmark results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '';
            try {
              summary = fs.readFileSync('benchmark-summary.txt', 'utf8');
            } catch (e) {
              summary = 'Benchmark summary not available.';
            }

            const body = `## Routing Benchmark Results\n\n\`\`\`\n${summary}\n\`\`\`\n\n<sub>Generated by [kicad-autorouter CI](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})</sub>`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('## Routing Benchmark Results'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Save benchmark cache
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: benchmark-results.json
          key: benchmark-results-main-${{ github.sha }}
